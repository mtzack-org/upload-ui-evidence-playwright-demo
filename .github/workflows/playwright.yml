name: Playwright UI evidence demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test

      - name: Upload UI evidence
        if: ${{ always() && env.PORTAL_URL != '' && env.INGEST_TOKEN != '' }}
        uses: mtzack-org/upload-ui-evidence@v1
        env:
          PORTAL_URL: ${{ secrets.UI_EVIDENCE_PORTAL_URL }}
          INGEST_TOKEN: ${{ secrets.UI_EVIDENCE_INGEST_TOKEN }}
        with:
          portal-url: ${{ env.PORTAL_URL }}
          token: ${{ env.INGEST_TOKEN }}
          platform: web
          status: ${{ job.status }}
          screenshots: test-results/**/*.png
          videos: test-results/**/*.webm
          reports: playwright-report/**/*.html
          traces: test-results/**/*.zip
          if-no-files-found: error
